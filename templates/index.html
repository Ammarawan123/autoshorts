<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AutoShorts AI | Smart Video Editor</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <header>
            <h1>AutoShorts <span class="accent">AI</span></h1>
            <p>Transform videos into viral shorts locally.</p>
        </header>

        <div class="upload-section">
            <form id="uploadForm">
                <div class="drop-zone" id="dropZone">
                    <p id="dropText">Drag & Drop video or <span>browse</span></p>
                    <input type="file" id="fileInput" name="file" accept="video/*" required hidden>
                </div>
                <button type="submit" id="uploadBtn">Generate Shorts</button>
            </form>
        </div>

        <div id="status"></div>
        <div id="resultsGrid" class="results-grid" style="display: none; margin-top: 30px;">
    <h3>Your Viral Shorts</h3>
    <div id="clipsContainer" class="clips-container"></div>
</div>
    </div>
    <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
